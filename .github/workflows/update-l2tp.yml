name: Update L2TP Server List

on:
  workflow_dispatch:         # 仅允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install aiohttp beautifulsoup4

      - name: Run L2TP fetcher
        run: python scripts/fetch_l2tp_servers.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add l2tp-servers.json l2tp-servers.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update L2TP server list [skip ci]"
          git push
